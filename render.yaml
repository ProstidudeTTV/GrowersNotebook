# Render Blueprint: https://docs.render.com/infrastructure-as-code
# Secrets: set in dashboard (DATABASE_URL / Supabase pooler, SUPABASE_*, WEB_ORIGIN on API;
# use comma-separated WEB_ORIGIN values if users hit multiple hostnames (e.g. custom domain
# and *.onrender.com). Browser API calls go through Next.js /api/gn-proxy when possible;
# NEXT_PUBLIC_* on web.
#
# Direct messages: plaintext in Supabase Postgres via Nest `DirectMessagesModule` (no Synapse).
#
# Supabase auth (email confirm / magic link): infra/render/SUPABASE_AUTH.md
# Canonical public site: https://growersnotebook.com (custom domain on Render).
# Supabase Site URL + Redirect URLs + API WEB_ORIGIN must use the same origin users see in the browser.
#
# --- Runtime: Docker (repo-root Dockerfiles). Avoids Render native Node builds that have failed
# in under a second with no logs on this workspace.
#
# Legacy native one-liners (if you must switch back in the dashboard):
# Web:  sh scripts/render-build-web.sh  →  npx pnpm@9.15.9 --filter @growers/web start
# API:  sh scripts/render-build-api.sh  →  npx pnpm@9.15.9 --filter @growers/api start:prod
#
# Live settings patch (API key):  RENDER_API_KEY=rnd_... pnpm run render:patch-notebook-services
# Docker patch:                   RENDER_API_KEY=rnd_... pnpm run render:patch-notebook-services --docker
#
# Latency: Free/spun-down web services cold-start (~30–60s). Starter “always on” reduces
# first-byte time for the API and web app. The web app uses parallel sidebar fetches + timeouts
# so a sleeping API does not hang navigation indefinitely.
#
# Legacy Synapse: if a `growers-synapse` service still auto-deploys from this repo, point it at
# its own Dockerfile/context — do not reuse Dockerfile.growers-*.

services:
  - type: web
    name: growers-notebook-api
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile.growers-api
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NPM_CONFIG_YES
        value: "true"
      - key: NODE_VERSION
        value: "20.18.1"
      - key: NODE_ENV
        value: production
      - key: LISTEN_HOST
        value: "0.0.0.0"

  - type: web
    name: growers-notebook-web
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile.growers-web
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: NPM_CONFIG_YES
        value: "true"
      - key: NODE_VERSION
        value: "20.18.1"
      # Baked into `next build` for metadata, auth redirects, and client-side canonical URLs.
      - key: NEXT_PUBLIC_SITE_URL
        value: https://growersnotebook.com
      # Supabase browser client (Settings → API). Required at build time for NEXT_PUBLIC inlining.
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        sync: false
      # Nest API origin (no trailing slash). Required for the app + dynamic sitemap entries.
      - key: NEXT_PUBLIC_API_URL
        sync: false
      # Optional: https://plausible.io — public hostname only (no https://), e.g. growersnotebook.com
      - key: NEXT_PUBLIC_PLAUSIBLE_DOMAIN
        sync: false
      - key: NEXT_PUBLIC_PLAUSIBLE_SCRIPT_URL
        sync: false
      # Optional: shared analytics URL to embed on /admin/analytics
      - key: NEXT_PUBLIC_ANALYTICS_DASHBOARD_URL
        sync: false
      # Optional: Google Search Console HTML tag verification value
      - key: NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION
        sync: false
