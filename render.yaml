# Render Blueprint: https://docs.render.com/infrastructure-as-code
# Secrets: set in dashboard (DATABASE_URL / Supabase pooler, SUPABASE_*, WEB_ORIGIN on API;
# use comma-separated WEB_ORIGIN values if users hit multiple hostnames (e.g. custom domain
# and *.onrender.com). Browser API calls go through Next.js /api/gn-proxy when possible;
# NEXT_PUBLIC_* on web.
#
# Direct messages: plaintext in Supabase Postgres via Nest `DirectMessagesModule` (no Synapse).
#
# Supabase auth (email confirm / magic link): infra/render/SUPABASE_AUTH.md
# Canonical public site: https://growersnotebook.com (custom domain on Render).
# Supabase Site URL + Redirect URLs + API WEB_ORIGIN must use the same origin users see in the browser.
#
# Build: Render sets NODE_ENV=production so pnpm skips devDependencies. Prefix install with
# env NODE_ENV=development … (see build commands below).
#
# --- Manual services: use `node` for Build Command (avoids npm-run quirks in some Render images):
#
# Web → Build Command:  node scripts/render-build-web.mjs
# API → Build Command:  node scripts/render-build-api.mjs
#
# Equivalent: npm run render:build:web  /  npm run render:build:api (root package.json)
# Shell fallback: sh scripts/render-build-web.sh  /  sh scripts/render-build-api.sh
#
# One-liner alternatives (no corepack; same as .mjs):
# Web: export NPM_CONFIG_YES=true NEXT_PUBLIC_APP_BUILD_ID="${RENDER_GIT_COMMIT:-dev}" && NODE_ENV=development pnpm install --frozen-lockfile && NODE_ENV=production pnpm --filter @growers/web build
# API: export NPM_CONFIG_YES=true && NODE_ENV=development pnpm install --frozen-lockfile && pnpm --filter @growers/api build
#
# Then: Manual Deploy → Clear build cache & deploy. Or: RENDER_API_KEY=rnd_... pnpm run render:patch-notebook-services
#
# Latency: Free/spun-down web services cold-start (~30–60s). Starter “always on” reduces
# first-byte time for the API and web app. The web app uses parallel sidebar fetches + timeouts
# so a sleeping API does not hang navigation indefinitely.
#
# Legacy Synapse services (`growers-synapse`, `growers-synapse-db`) were removed from this blueprint.
# IMPORTANT: If `growers-synapse` still auto-deploys from this repo, builds WILL FAIL — there is no
# root Dockerfile anymore. In the Render Dashboard: delete that web service (and the synapse Postgres
# instance if unused), or at minimum turn off Auto-Deploy for it. API + web deploys are unaffected.

services:
  - type: web
    name: growers-notebook-api
    runtime: node
    region: oregon
    plan: starter
    # Drizzle migrations run at every API boot via apps/api package.json start:prod (no Render pre-deploy UI needed).
    # /health reports catalogTablesPresent when strains/breeders exist (see AppController).
    buildCommand: node scripts/render-build-api.mjs
    startCommand: npx pnpm@9.15.9 --filter @growers/api start:prod
    healthCheckPath: /health
    envVars:
      - key: NPM_CONFIG_YES
        value: "true"
      - key: NODE_ENV
        value: production
      - key: LISTEN_HOST
        value: "0.0.0.0"

  - type: web
    name: growers-notebook-web
    runtime: node
    region: oregon
    plan: starter
    # NEXT_PUBLIC_APP_BUILD_ID lets the browser detect deploys and auto-reload (see /api/build-info).
    buildCommand: node scripts/render-build-web.mjs
    startCommand: npx pnpm@9.15.9 --filter @growers/web start
    healthCheckPath: /
    envVars:
      - key: NPM_CONFIG_YES
        value: "true"
      # Baked into `next build` for metadata, auth redirects, and client-side canonical URLs.
      - key: NEXT_PUBLIC_SITE_URL
        value: https://growersnotebook.com
      # Nest API origin (no trailing slash). Required for the app + dynamic sitemap entries.
      - key: NEXT_PUBLIC_API_URL
        sync: false
      # Optional: https://plausible.io — public hostname only (no https://), e.g. growersnotebook.com
      - key: NEXT_PUBLIC_PLAUSIBLE_DOMAIN
        sync: false
      - key: NEXT_PUBLIC_PLAUSIBLE_SCRIPT_URL
        sync: false
      # Optional: shared analytics URL to embed on /admin/analytics
      - key: NEXT_PUBLIC_ANALYTICS_DASHBOARD_URL
        sync: false
      # Optional: Google Search Console HTML tag verification value
      - key: NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION
        sync: false
