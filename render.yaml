# Render Blueprint: https://docs.render.com/infrastructure-as-code
# Secrets: set in dashboard (DATABASE_URL / Supabase pooler, SUPABASE_*, WEB_ORIGIN on API;
# use comma-separated WEB_ORIGIN values if users hit multiple hostnames (e.g. custom domain
# and *.onrender.com). Browser API calls also go through Next.js /api/gn-proxy when possible;
# NEXT_PUBLIC_* on web; SYNAPSE_* on API for messaging; SYNAPSE_JWT_SECRET on both API + Synapse).
#
# Messaging homeserver: `growers-synapse` (Docker) + Postgres `growers-synapse-db`.
# Runbook: infra/render/synapse/README.md
#
# Supabase auth (email confirm / magic link): infra/render/SUPABASE_AUTH.md
# Canonical public site: https://growersnotebook.com (custom domain on Render).
# Supabase Site URL + Redirect URLs + API WEB_ORIGIN must use the same origin users see in the browser.
#
# Build: Render sets NODE_ENV=production so pnpm skips devDependencies. Prefix install with
# env NODE_ENV=development … (see build commands below).
#
# Latency: Free/spun-down web services cold-start (~30–60s). Starter “always on” reduces
# first-byte time for the API, web app, and Synapse. The web app also uses parallel sidebar
# fetches + timeouts so a sleeping API does not hang navigation indefinitely.

services:
  - type: web
    name: growers-notebook-api
    runtime: node
    region: oregon
    plan: starter
    # After adding migrations, run once with production DATABASE_URL:
    #   pnpm --filter @growers/api db:migrate
    # /health reports catalogTablesPresent when strains/breeders exist (see AppController).
    buildCommand: env NODE_ENV=development npx pnpm@9.15.9 install --frozen-lockfile && npx pnpm@9.15.9 --filter @growers/api build
    startCommand: npx pnpm@9.15.9 --filter @growers/api start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LISTEN_HOST
        value: "0.0.0.0"
      # Messaging (after Synapse is live — same values as in infra/render/synapse/README.md):
      # SYNAPSE_BASE_URL, SYNAPSE_PUBLIC_BASE_URL, SYNAPSE_SERVER_NAME, SYNAPSE_JWT_SECRET,
      # SYNAPSE_ADMIN_ACCESS_TOKEN

  - type: web
    name: growers-notebook-web
    runtime: node
    region: oregon
    plan: starter
    # NEXT_PUBLIC_APP_BUILD_ID lets the browser detect deploys and auto-reload (see /api/build-info).
    buildCommand: export NEXT_PUBLIC_APP_BUILD_ID="${RENDER_GIT_COMMIT:-dev}" && env NODE_ENV=development npx pnpm@9.15.9 install --frozen-lockfile && npx pnpm@9.15.9 --filter @growers/web build
    startCommand: npx pnpm@9.15.9 --filter @growers/web start
    healthCheckPath: /
    envVars:
      # Baked into `next build` for metadata, auth redirects, and client-side canonical URLs.
      - key: NEXT_PUBLIC_SITE_URL
        value: https://growersnotebook.com
      # Nest API origin (no trailing slash). Required for the app + dynamic sitemap entries.
      - key: NEXT_PUBLIC_API_URL
        sync: false
      # Optional: https://plausible.io — public hostname only (no https://), e.g. growersnotebook.com
      - key: NEXT_PUBLIC_PLAUSIBLE_DOMAIN
        sync: false
      - key: NEXT_PUBLIC_PLAUSIBLE_SCRIPT_URL
        sync: false
      # Optional: shared analytics URL to embed on /admin/analytics
      - key: NEXT_PUBLIC_ANALYTICS_DASHBOARD_URL
        sync: false
      # Optional: Google Search Console HTML tag verification value
      - key: NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION
        sync: false

  - type: web
    name: growers-synapse
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./infra/render/synapse/Dockerfile
    dockerContext: ./infra/render/synapse
    healthCheckPath: /_matrix/client/versions
    disk:
      name: synapse-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: growers-synapse-db
          property: connectionString
      - key: SYNAPSE_REPORT_STATS
        value: no
      - key: SYNAPSE_SERVER_NAME
        value: growers-synapse.onrender.com
      - key: SYNAPSE_PUBLIC_BASE_URL
        value: https://growers-synapse.onrender.com
      - key: SYNAPSE_JWT_SECRET
        sync: false
      # Optional bootstrap: set in dashboard; patch_config writes registration_shared_secret to homeserver.yaml
      - key: SYNAPSE_REGISTRATION_SHARED_SECRET
        sync: false

databases:
  - name: growers-synapse-db
    databaseName: synapse
    user: synapse
    region: oregon
