# Render Blueprint: https://docs.render.com/infrastructure-as-code
# After linking https://github.com/ProstidudeTTV/GrowersNotebook, set secrets in the dashboard
# (DATABASE_URL / Supabase pooler, SUPABASE_*, WEB_ORIGIN on API; NEXT_PUBLIC_* on web).
#
# Matrix Postgres: a DB named `growers-matrix-postgres` may already exist on your workspace
# (created via Render MCP). Use its **Internal Database URL** in Synapse `homeserver.yaml`, not Supabase.
# Synapse itself is not defined here—run it via `infra/synapse/docker-compose.yml` locally or add a
# Render **Docker** Web Service separately (MCP `create_web_service` is Node-only).

services:
  - type: web
    name: growers-notebook-api
    runtime: node
    region: oregon
    plan: starter
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @growers/api build
    startCommand: pnpm --filter @growers/api start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LISTEN_HOST
        value: "0.0.0.0"

  - type: web
    name: growers-notebook-web
    runtime: node
    region: oregon
    plan: starter
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @growers/web build
    startCommand: pnpm --filter @growers/web start
    healthCheckPath: /

