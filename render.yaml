# Render Blueprint: https://docs.render.com/infrastructure-as-code
# Secrets: set in dashboard (DATABASE_URL / Supabase pooler, SUPABASE_*, WEB_ORIGIN on API;
# NEXT_PUBLIC_* on web; SYNAPSE_* on API for messaging; SYNAPSE_JWT_SECRET on both API + Synapse).
#
# Messaging homeserver: `growers-synapse` (Docker) + Postgres `growers-synapse-db`.
# Runbook: infra/render/synapse/README.md
#
# Build: Render sets NODE_ENV=production so pnpm skips devDependencies. Prefix install with
# env NODE_ENV=development … (see build commands below).

services:
  - type: web
    name: growers-notebook-api
    runtime: node
    region: oregon
    plan: starter
    buildCommand: env NODE_ENV=development npx pnpm@9.15.9 install --frozen-lockfile && npx pnpm@9.15.9 --filter @growers/api build
    startCommand: npx pnpm@9.15.9 --filter @growers/api start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LISTEN_HOST
        value: "0.0.0.0"
      # Messaging (after Synapse is live — same values as in infra/render/synapse/README.md):
      # SYNAPSE_BASE_URL, SYNAPSE_PUBLIC_BASE_URL, SYNAPSE_SERVER_NAME, SYNAPSE_JWT_SECRET,
      # SYNAPSE_ADMIN_ACCESS_TOKEN

  - type: web
    name: growers-notebook-web
    runtime: node
    region: oregon
    plan: starter
    buildCommand: env NODE_ENV=development npx pnpm@9.15.9 install --frozen-lockfile && npx pnpm@9.15.9 --filter @growers/web build
    startCommand: npx pnpm@9.15.9 --filter @growers/web start
    healthCheckPath: /

  - type: web
    name: growers-synapse
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./infra/render/synapse/Dockerfile
    dockerContext: ./infra/render/synapse
    healthCheckPath: /_matrix/client/versions
    disk:
      name: synapse-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: growers-synapse-db
          property: connectionString
      - key: SYNAPSE_REPORT_STATS
        value: no
      - key: SYNAPSE_SERVER_NAME
        value: growers-synapse.onrender.com
      - key: SYNAPSE_PUBLIC_BASE_URL
        value: https://growers-synapse.onrender.com
      - key: SYNAPSE_JWT_SECRET
        sync: false

databases:
  - name: growers-synapse-db
    databaseName: synapse
    user: synapse
    region: oregon
